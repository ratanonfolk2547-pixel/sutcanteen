```html
<script>

  let allRestaurants = [];

  let currentRestaurants = [];

  // =========================
  // โหลดข้อมูล
  // =========================

  async function loadData(){

    try{

      console.log("Loading data...");

      const response =
        await fetch("/data");

      const result =
        await response.json();

      console.log(result);

      const rows =
        result.data || [];

      const restaurants = {};

      // =========================
      // LOOP ข้อมูลจาก SHEET
      // =========================

      rows.forEach(row => {

        const name =
          row[1]?.trim();

        const menu =
          row[2]?.trim();

        const score =
          parseFloat(row[3]) || 0;

        const highlight =
          row[4] || "ไม่มีข้อมูล";

        const category =
          row[5] || "ไม่ระบุ";

        // ถ้าไม่มีชื่อร้าน
        if(!name) return;

        // =========================
        // IMAGE
        // =========================

        let image =
          "default.jpg";

        if(name.includes("ข้าวมันไก่ตระกูลอ๋อง")){
          image = "13.jpg";
        }

        else if(name.includes("เครื่องดื่ม & กาแฟ & ขนม")){
          image = "1.jpg";
        }

        else if(name.includes("ก๋วยเตี๋ยวหมู เย็นตาโฟ")){
          image = "2.jpg";
        }

        else if(name.includes("ข้าวราดแกง เบอร์ 3")){
          image = "3.jpg";
        }

        else if(name.includes("อาหารตามสั่ง เบอร์ 4")){
          image = "4.jpg";
        }

        else if(name.includes("ฐ.ข้าวมันไก่")){
          image = "5.jpg";
        }

        else if(name.includes("อาหารอีสาน ขนมจีน")){
          image = "6.jpg";
        }

        else if(name.includes("ข้าวราดแกง (มุสลิม)")){
          image = "7.jpg";
        }

        else if(name.includes("ข้าวราดแกง เบอร์ 8")){
          image = "8.jpg";
        }

        else if(name.includes("เจ้น้อง ก๋วยเตี๋ยวเนื้อ / ไก่ตุ๋น")){
          image = "9.jpg";
        }

        else if(name.includes("อาหารตามสั่ง เบอร์ 10")){
          image = "10.jpg";
        }

        else if(name.includes("เครื่องดื่ม & ขนมหวาน & ผลไม้")){
          image = "11.jpg";
        }

        else if(name.includes("ร้านข้างหน้าร้านน้ำ เบอร์ 11")){
          image = "12.jpg";
        }

        // =========================
        // CREATE RESTAURANT
        // =========================

        if(!restaurants[name]){

          restaurants[name] = {

            totalScore:0,

            totalPeople:0,

            highlight:"",

            category:"",

            image:"",

            menus:{}

          };

        }

        // =========================
        // รวมคะแนนร้าน
        // =========================

        restaurants[name]
          .totalScore += score;

        restaurants[name]
          .totalPeople += 1;

        restaurants[name]
          .highlight = highlight;

        restaurants[name]
          .category = category;

        restaurants[name]
          .image = image;

        // =========================
        // รวมคะแนนเมนู
        // =========================

        if(
          menu &&
          menu !== "ไม่มีข้อมูล"
        ){

          // ถ้ายังไม่มีเมนูนี้

          if(
            !restaurants[name]
              .menus[menu]
          ){

            restaurants[name]
              .menus[menu] = {

              totalScore:0,

              people:0

            };

          }

          // รวมคะแนน

          restaurants[name]
            .menus[menu]
            .totalScore += score;

          // จำนวนรีวิว

          restaurants[name]
            .menus[menu]
            .people += 1;

        }

      });

      // =========================
      // แปลงข้อมูลร้าน
      // =========================

      allRestaurants =

        Object.entries(restaurants)

        .map(([name,data]) => {

          // =========================
          // คะแนนเฉลี่ยร้าน
          // =========================

          const avgScore =

            data.totalPeople > 0

            ? (
                data.totalScore
                /
                data.totalPeople
              )

            : 0;

          // =========================
          // MENU SORT
          // =========================

          const sortedMenus =

            Object.entries(
              data.menus || {}
            )

            .map(([menuName,menuData]) => {

              const menuAvg =

                menuData.people > 0

                ? (
                    menuData.totalScore
                    /
                    menuData.people
                  )

                : 0;

              return {

                name:menuName,

                avg:menuAvg,

                people:menuData.people

              };

            })

            .sort((a,b) => {

              // เรียงคะแนนก่อน

              if(b.avg !== a.avg){

                return b.avg - a.avg;

              }

              // คะแนนเท่ากัน
              // ดูจำนวนรีวิว

              if(b.people !== a.people){

                return b.people - a.people;

              }

              // ถ้ายังเท่ากัน
              // เรียงชื่อ

              return a.name.localeCompare(

                b.name,

                "th"

              );

            });

          return {

            name:name,

            avg:avgScore,

            people:data.totalPeople,

            highlight:data.highlight,

            category:data.category,

            image:data.image,

            menus:sortedMenus

          };

        })

        // =========================
        // SORT ร้าน
        // =========================

        .sort((a,b) => {

          if(b.avg !== a.avg){

            return b.avg - a.avg;

          }

          return b.people - a.people;

        });

      console.log(allRestaurants);

      createCategoryButtons();

      showRestaurants(allRestaurants);

    }

    catch(error){

      console.error(error);

      document.getElementById(
        "cards"
      ).innerHTML = `

        <div style="
          color:red;
          font-size:28px;
          padding:40px;
        ">

          โหลดข้อมูลไม่สำเร็จ

        </div>

      `;

    }

  }

  // =========================
  // CATEGORY BUTTON
  // =========================

  function createCategoryButtons(){

    const categoryList =

      document.getElementById(
        "categoryList"
      );

    const categorySet =
      new Set();

    allRestaurants.forEach(shop => {

      const words =

        shop.category
        .split(/[ ,/&]+/);

      words.forEach(word => {

        if(word.trim()){

          categorySet.add(
            word.trim()
          );

        }

      });

    });

    let html = "";

    html += `

      <button
        class="category-btn"
        onclick="
          filterRestaurants('ทั้งหมด')
        "
      >

        ทั้งหมด

      </button>

    `;

    categorySet.forEach(category => {

      html += `

        <button
          class="category-btn"
          onclick="
            filterRestaurants(
              '${category}'
            )
          "
        >

          ${category}

        </button>

      `;

    });

    categoryList.innerHTML =
      html;

  }

  // =========================
  // FILTER
  // =========================

  function filterRestaurants(category){

    if(category === "ทั้งหมด"){

      showRestaurants(
        allRestaurants
      );

      return;

    }

    const filtered =

      allRestaurants.filter(shop =>

        shop.category.includes(
          category
        )

      );

    showRestaurants(filtered);

  }

  // =========================
  // SHOW RESTAURANTS
  // =========================

  function showRestaurants(restaurants){

    currentRestaurants =
      restaurants;

    const cards =

      document.getElementById(
        "cards"
      );

    let html = "";

    if(restaurants.length === 0){

      cards.innerHTML = `

        <div class="empty">

          ไม่พบร้านอาหารประเภทนี้

        </div>

      `;

      return;

    }

    restaurants.forEach((shop,index) => {

      html += `

        <div
          class="card"
          onclick="openModal(${index})"
        >

          <img
            class="card-image"
            src="images/${shop.image}"
          >

          <div class="card-content">

            <div class="top-rank">

              TOP ${index + 1}

            </div>

            <div class="restaurant-name">

              ${shop.name}

            </div>

            <div class="score">

              ⭐ ${shop.avg.toFixed(1)}/5

            </div>

            <div class="info">

              🍜 ${shop.category}

            </div>

            <div class="info">

              🔥 ${shop.highlight}

            </div>

            <div class="info">

              👥 ${shop.people} รีวิว

            </div>

          </div>

        </div>

      `;

    });

    cards.innerHTML = html;

  }

  // =========================
  // OPEN MODAL
  // =========================

  function openModal(index){

    const shop =
      currentRestaurants[index];

    if(!shop) return;

    document.getElementById(
      "modal"
    ).style.display = "block";

    document.getElementById(
      "modalImage"
    ).src =
      `images/${shop.image}`;

    document.getElementById(
      "modalTitle"
    ).innerText =
      shop.name;

    document.getElementById(
      "modalScore"
    ).innerText =
      `⭐ คะแนน ${shop.avg.toFixed(1)}/5`;

    document.getElementById(
      "modalCategory"
    ).innerText =
      `🍜 ${shop.category}`;

    document.getElementById(
      "modalHighlight"
    ).innerText =
      `🔥 ${shop.highlight}`;

    document.getElementById(
      "modalPeople"
    ).innerText =
      `👥 ${shop.people} รีวิว`;

    let menuHTML = "";

    // =========================
    // MENU
    // =========================

    (shop.menus || []).forEach(
      (menu,index) => {

      menuHTML += `

        <div class="modal-menu-item">

          <b>

            #${index + 1}
            ${menu.name}

          </b>

          <br><br>

          ⭐ ${menu.avg.toFixed(1)}/5

          <br>

          👥 ${menu.people} รีวิว

        </div>

      `;

    });

    document.getElementById(
      "modalMenus"
    ).innerHTML =
      menuHTML;

  }

  // =========================
  // CLOSE MODAL
  // =========================

  function closeModal(){

    document.getElementById(
      "modal"
    ).style.display = "none";

  }

  // =========================
  // CLICK OUTSIDE
  // =========================

  window.onclick = function(event){

    const modal =

      document.getElementById(
        "modal"
      );

    if(event.target == modal){

      modal.style.display =
        "none";

    }

  }

  // =========================
  // START
  // =========================

  loadData();

</script>
```

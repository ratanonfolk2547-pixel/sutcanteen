```html
<script>

  let allRestaurants = [];

  // =========================
  // โหลดข้อมูลจาก Server
  // =========================

  async function loadData(){

    try{

      const response =
        await fetch("/data");

      const result =
        await response.json();

      const rows =
        result.data || [];

      const restaurants = {};

      rows.forEach(row => {

        /*
          row[0] = Timestamp
          row[1] = ชื่อร้าน
          row[2] = เมนูแนะนำ
          row[3] = คะแนน
          row[4] = จุดเด่น
          row[5] = ประเภทอาหาร
        */

        const name =
          row[1]?.trim();

        const menu =
          row[2]?.trim();

        const score =
          parseFloat(row[3]) || 0;

        const highlight =
          row[4] || "ไม่มีข้อมูล";

        const category =
          row[5] || "ไม่ระบุ";

        if(!name) return;

        // =========================
        // รูปภาพร้าน
        // =========================

        let image =
          "default.jpg";

        if(name.includes("ข้าวมันไก่ตระกูลอ๋อง")){
          image = "13.jpg";
        }

        else if(name.includes("เครื่องดื่ม & กาแฟ & ขนม")){
          image = "1.jpg";
        }

        else if(name.includes("ก๋วยเตี๋ยวหมู เย็นตาโฟ")){
          image = "2.jpg";
        }

        else if(name.includes("ข้าวราดแกง เบอร์ 3")){
          image = "3.jpg";
        }

        else if(name.includes("อาหารตามสั่ง เบอร์ 4")){
          image = "4.jpg";
        }

        else if(name.includes("ฐ.ข้าวมันไก่")){
          image = "5.jpg";
        }

        else if(name.includes("อาหารอีสาน ขนมจีน")){
          image = "6.jpg";
        }

        else if(name.includes("ข้าวราดแกง (มุสลิม)")){
          image = "7.jpg";
        }

        else if(name.includes("ข้าวราดแกง เบอร์ 8")){
          image = "8.jpg";
        }

        else if(name.includes("เจ้น้อง ก๋วยเตี๋ยวเนื้อ / ไก่ตุ๋น")){
          image = "9.jpg";
        }

        else if(name.includes("อาหารตามสั่ง เบอร์ 10")){
          image = "10.jpg";
        }

        else if(name.includes("เครื่องดื่ม & ขนมหวาน & ผลไม้")){
          image = "11.jpg";
        }

        else if(name.includes("ร้านข้างหน้าร้านน้ำ เบอร์ 11")){
          image = "12.jpg";
        }

        // =========================
        // สร้าง Object ร้าน
        // =========================

        if(!restaurants[name]){

          restaurants[name] = {

            totalScore:0,

            totalPeople:0,

            highlight:"",

            category:"",

            image:"",

            menus:{}

          };

        }

        // =========================
        // รวมคะแนนร้าน
        // =========================

        restaurants[name]
          .totalScore += score;

        restaurants[name]
          .totalPeople += 1;

        restaurants[name]
          .highlight = highlight;

        restaurants[name]
          .category = category;

        restaurants[name]
          .image = image;

        // =========================
        // รวมคะแนนเมนู
        // =========================

        if(
          menu &&
          menu !== "ไม่มีข้อมูล"
        ){

          if(
            !restaurants[name]
              .menus[menu]
          ){

            restaurants[name]
              .menus[menu] = {

              totalScore:0,

              people:0

            };

          }

          restaurants[name]
            .menus[menu]
            .totalScore += score;

          restaurants[name]
            .menus[menu]
            .people += 1;

        }

      });

      // =========================
      // แปลงข้อมูลร้าน
      // =========================

      allRestaurants =

        Object.entries(restaurants)

        .map(([name,data]) => {

          const avgScore =

            data.totalPeople > 0

            ? (
                data.totalScore
                /
                data.totalPeople
              )

            : 0;

          // =========================
          // แปลงเมนู + เรียงคะแนน
          // =========================

          const sortedMenus =

            Object.entries(data.menus)

            .map(([menuName,menuData]) => {

              const menuAvg =

                menuData.totalScore
                /
                menuData.people;

              return {

                name:menuName,

                avg:menuAvg,

                people:menuData.people

              };

            })

            // =========================
            // เรียงคะแนนเมนู
            // =========================

            .sort((a,b) =>

              b.avg - a.avg

            );

          return {

            name:name,

            avg:avgScore,

            people:data.totalPeople,

            highlight:data.highlight,

            category:data.category,

            image:data.image,

            menus:sortedMenus

          };

        })

        // =========================
        // เรียงคะแนนร้าน
        // =========================

        .sort((a,b) =>

          b.avg - a.avg

        );

      createCategoryButtons();

      showRestaurants(allRestaurants);

    }

    catch(error){

      console.log(error);

    }

  }

  // =========================
  // สร้างปุ่มประเภทอาหาร
  // =========================

  function createCategoryButtons(){

    const categoryList =

      document.getElementById(
        "categoryList"
      );

    const categorySet =
      new Set();

    allRestaurants.forEach(shop => {

      const words =

        shop.category
        .split(/[ ,/&]+/);

      words.forEach(word => {

        if(word.trim()){

          categorySet.add(
            word.trim()
          );

        }

      });

    });

    let html = "";

    html += `

      <button
        class="category-btn"

        onclick="
          filterRestaurants('ทั้งหมด')
        "
      >

        ทั้งหมด

      </button>

    `;

    categorySet.forEach(category => {

      html += `

        <button
          class="category-btn"

          onclick="
            filterRestaurants(
              '${category}'
            )
          "
        >

          ${category}

        </button>

      `;

    });

    categoryList.innerHTML =
      html;

  }

  // =========================
  // Filter ร้านอาหาร
  // =========================

  function filterRestaurants(category){

    if(category === "ทั้งหมด"){

      showRestaurants(
        allRestaurants
      );

      return;

    }

    const filtered =

      allRestaurants.filter(shop =>

        shop.category
          .includes(category)

      );

    showRestaurants(filtered);

  }

  // =========================
  // แสดงร้านอาหาร
  // =========================

  function showRestaurants(restaurants){

    const cards =

      document.getElementById(
        "cards"
      );

    let html = "";

    if(restaurants.length === 0){

      html = `

        <div class="empty">

          ไม่พบร้านอาหารประเภทนี้

        </div>

      `;

      cards.innerHTML = html;

      return;

    }

    restaurants.forEach((shop,index) => {

      html += `

        <div
          class="card"

          onclick='openModal(
            ${JSON.stringify(shop)}
          )'
        >

          <img
            class="card-image"

            src="
              images/${shop.image}
            "
          >

          <div class="card-content">

            <div class="top-rank">

              TOP ${index + 1}

            </div>

            <div class="restaurant-name">

              ${shop.name}

            </div>

            <div class="score">

              ⭐ ${shop.avg.toFixed(1)}/5

            </div>

            <div class="info">

              🍜 ประเภทอาหาร:
              ${shop.category}

            </div>

            <div class="info">

              🔥 จุดเด่น:
              ${shop.highlight}

            </div>

            <div class="info">

              👥 จำนวนผู้รีวิว:
              ${shop.people} คน

            </div>

          </div>

        </div>

      `;

    });

    cards.innerHTML = html;

  }

  // =========================
  // เปิด Popup
  // =========================

  function openModal(shop){

    document.getElementById(
      "modal"
    ).style.display = "block";

    document.getElementById(
      "modalImage"
    ).src =
      `images/${shop.image}`;

    document.getElementById(
      "modalTitle"
    ).innerText =
      shop.name;

    document.getElementById(
      "modalScore"
    ).innerText =
      `⭐ คะแนน ${shop.avg.toFixed(1)}/5`;

    document.getElementById(
      "modalCategory"
    ).innerText =
      `🍜 ประเภทอาหาร: ${shop.category}`;

    document.getElementById(
      "modalHighlight"
    ).innerText =
      `🔥 จุดเด่น: ${shop.highlight}`;

    document.getElementById(
      "modalPeople"
    ).innerText =
      `👥 จำนวนผู้รีวิว: ${shop.people} คน`;

    let menuHTML = "";

    // =========================
    // เรียงเมนูตามคะแนน
    // =========================

    shop.menus.forEach((menu,index) => {

      menuHTML += `

        <div class="modal-menu-item">

          <b>

            #${index + 1}
            ${menu.name}

          </b>

          <br><br>

          ⭐ คะแนน:
          ${menu.avg.toFixed(1)}/5

          <br>

          👥 รีวิว:
          ${menu.people} คน

        </div>

      `;

    });

    document.getElementById(
      "modalMenus"
    ).innerHTML =
      menuHTML;

  }

  // =========================
  // ปิด Popup
  // =========================

  function closeModal(){

    document.getElementById(
      "modal"
    ).style.display = "none";

  }

  // =========================
  // กดพื้นหลังปิด Popup
  // =========================

  window.onclick = function(event){

    const modal =

      document.getElementById(
        "modal"
      );

    if(event.target == modal){

      modal.style.display =
        "none";

    }

  }

  // =========================
  // เริ่มโหลดข้อมูล
  // =========================

  loadData();

</script>
```

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    SUTCANTEEN 🍜

  </div>

  <!-- CATEGORY -->

  <div class="container">

    <div class="section-title">

      🍽️ ประเภทอาหาร

    </div>

    <div
      class="category-list"
      id="categoryList"
    >

    </div>

  </div>

  <!-- CARDS -->

  <div class="container">

    <div class="section-title">

      🔥 ร้านอาหารแนะนำ

    </div>

    <div
      class="cards"
      id="cards"
    >

    </div>

  </div>

  <!-- MODAL -->

  <div
    class="modal"
    id="modal"
  >

    <span
      class="close"
      onclick="closeModal()"
    >

      ×

    </span>

    <div class="modal-content">

      <img
        id="modalImage"
        class="modal-image"
      >

      <div class="modal-body">

        <div
          class="modal-title"
          id="modalTitle"
        >
        </div>

        <div
          class="modal-info"
          id="modalScore"
        >
        </div>

        <div
          class="modal-info"
          id="modalCategory"
        >
        </div>

        <div
          class="modal-info"
          id="modalHighlight"
        >
        </div>

        <div
          class="modal-info"
          id="modalPeople"
        >
        </div>

        <div class="modal-menu">

          <div class="modal-menu-title">

            🍽️ เมนูแนะนำ

          </div>

          <div id="modalMenus">

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    let allRestaurants = [];

    let currentRestaurants = [];

    // =========================
    // LOAD DATA
    // =========================

    async function loadData(){

      try{

        console.log("Loading data...");

        const response =
          await fetch("/data");

        const result =
          await response.json();

        console.log(result);

        const rows =
          result.data || [];

        const restaurants = {};

        rows.forEach(row => {

          const name =
            row[1]?.trim();

          const menu =
            row[2]?.trim();

          const score =
            parseFloat(row[3]) || 0;

          const highlight =
            row[4] || "ไม่มีข้อมูล";

          const category =
            row[5] || "ไม่ระบุ";

          if(!name) return;

          let image =
            "default.jpg";

          if(name.includes("ข้าวมันไก่ตระกูลอ๋อง")){
            image = "13.jpg";
          }

          // =====================
          // CREATE SHOP
          // =====================

          if(!restaurants[name]){

            restaurants[name] = {

              totalScore:0,

              totalPeople:0,

              highlight:"",

              category:"",

              image:"",

              menus:{}

            };

          }

          restaurants[name]
            .totalScore += score;

          restaurants[name]
            .totalPeople += 1;

          restaurants[name]
            .highlight = highlight;

          restaurants[name]
            .category = category;

          restaurants[name]
            .image = image;

          // =====================
          // MENU
          // =====================

          if(menu){

            if(
              !restaurants[name]
                .menus[menu]
            ){

              restaurants[name]
                .menus[menu] = {

                totalScore:0,

                people:0

              };

            }

            restaurants[name]
              .menus[menu]
              .totalScore += score;

            restaurants[name]
              .menus[menu]
              .people += 1;

          }

        });

        // =========================
        // CONVERT
        // =========================

        allRestaurants =

          Object.entries(restaurants)

          .map(([name,data]) => {

            const avgScore =

              data.totalPeople > 0

              ? (
                  data.totalScore
                  /
                  data.totalPeople
                )

              : 0;

            const sortedMenus =

              Object.entries(data.menus)

              .map(([menuName,menuData]) => {

                return {

                  name:menuName,

                  avg:
                    menuData.totalScore
                    /
                    menuData.people,

                  people:
                    menuData.people

                };

              })

              .sort((a,b) => {

                if(b.avg !== a.avg){

                  return b.avg - a.avg;

                }

                return b.people - a.people;

              });

            return {

              name:name,

              avg:avgScore,

              people:data.totalPeople,

              highlight:data.highlight,

              category:data.category,

              image:data.image,

              menus:sortedMenus

            };

          })

          .sort((a,b) => {

            if(b.avg !== a.avg){

              return b.avg - a.avg;

            }

            return b.people - a.people;

          });

        console.log(allRestaurants);

        createCategoryButtons();

        showRestaurants(allRestaurants);

      }

      catch(error){

        console.error(error);

      }

    }

    // =========================
    // CATEGORY BUTTONS
    // =========================

    function createCategoryButtons(){

      const categoryList =
        document.getElementById(
          "categoryList"
        );

      if(!categoryList){

        console.log(
          "categoryList not found"
        );

        return;

      }

      const categorySet =
        new Set();

      allRestaurants.forEach(shop => {

        categorySet.add(
          shop.category
        );

      });

      let html = "";

      html += `

        <button
          class="category-btn"
          onclick="
            filterRestaurants('ทั้งหมด')
          "
        >

          ทั้งหมด

        </button>

      `;

      categorySet.forEach(category => {

        html += `

          <button
            class="category-btn"
            onclick="
              filterRestaurants(
                '${category}'
              )
            "
          >

            ${category}

          </button>

        `;

      });

      categoryList.innerHTML =
        html;

    }

    // =========================
    // FILTER
    // =========================

    function filterRestaurants(category){

      if(category === "ทั้งหมด"){

        showRestaurants(
          allRestaurants
        );

        return;

      }

      const filtered =

        allRestaurants.filter(shop =>

          shop.category.includes(
            category
          )

        );

      showRestaurants(filtered);

    }

    // =========================
    // SHOW
    // =========================

    function showRestaurants(restaurants){

      currentRestaurants =
        restaurants;

      const cards =
        document.getElementById(
          "cards"
        );

      if(!cards) return;

      let html = "";

      restaurants.forEach((shop,index) => {

        html += `

          <div
            class="card"
            onclick="
              openModal(${index})
            "
          >

            <img
              class="card-image"
              src="images/${shop.image}"
            >

            <div class="card-content">

              <div class="top-rank">

                TOP ${index + 1}

              </div>

              <div class="restaurant-name">

                ${shop.name}

              </div>

              <div class="score">

                ⭐ ${shop.avg.toFixed(1)}/5

              </div>

            </div>

          </div>

        `;

      });

      cards.innerHTML =
        html;

    }

    // =========================
    // OPEN MODAL
    // =========================

    function openModal(index){

      const shop =
        currentRestaurants[index];

      if(!shop) return;

      document.getElementById(
        "modal"
      ).style.display = "block";

      document.getElementById(
        "modalTitle"
      ).innerText =
        shop.name;

      let menuHTML = "";

      shop.menus.forEach(menu => {

        menuHTML += `

          <div class="modal-menu-item">

            ${menu.name}

            ⭐ ${menu.avg.toFixed(1)}

          </div>

        `;

      });

      document.getElementById(
        "modalMenus"
      ).innerHTML =
        menuHTML;

    }

    // =========================
    // CLOSE
    // =========================

    function closeModal(){

      document.getElementById(
        "modal"
      ).style.display = "none";

    }

    // =========================
    // START
    // =========================

    window.onload = function(){

      loadData();

    };

  </script>

</body>

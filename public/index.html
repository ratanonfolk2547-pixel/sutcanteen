<body>

  <!-- NAVBAR -->

  <div class="navbar">

    SUTCANTEEN 🍜

  </div>

  <!-- BANNER -->

  <div class="banner">

    <div class="banner-text">

      <h1>

        ระบบแนะนำร้านอาหาร

      </h1>

      <p>

        วิเคราะห์ข้อมูลจาก Google Forms
        พร้อมจัดอันดับร้านอาหาร
        และเมนูยอดนิยมจากผู้ใช้งานจริง

      </p>

    </div>

  </div>

  <!-- CONTENT -->

  <div class="container">

    <!-- CATEGORY -->

    <div class="section-title">

      🍽️ เลือกประเภทอาหาร

    </div>

    <div
      class="category-list"
      id="categoryList"
    ></div>

    <!-- RESTAURANT -->

    <div class="section-title">

      🔥 ร้านอาหารแนะนำ

    </div>

    <div
      class="cards"
      id="cards"
    ></div>

  </div>

  <!-- SCRIPT -->

  <script>

    let allRestaurants = [];

    // =========================
    // LOAD DATA
    // =========================

    async function loadData(){

      try{

        console.log("Loading data...");

        const response =
          await fetch("/data");

        const result =
          await response.json();

        console.log(result);

        const rows =
          result.data || [];

        const restaurants = {};

        // =========================
        // LOOP DATA
        // =========================

        rows.forEach(row => {

          const name =
            row[1]?.trim();

          const menu =
            row[2]?.trim();

          const score =
            parseFloat(row[3]) || 0;

          const highlight =
            row[4] || "ไม่มีข้อมูล";

          const category =
            row[5] || "ไม่ระบุ";

          if(!name) return;

          // =========================
          // IMAGE
          // =========================

          let image =
            "default.jpg";

          if(name.includes("ข้าวมันไก่ตระกูลอ๋อง")){
            image = "13.jpg";
          }

          else if(name.includes("เครื่องดื่ม & กาแฟ & ขนม")){
            image = "1.jpg";
          }

          else if(name.includes("ก๋วยเตี๋ยวหมู เย็นตาโฟ")){
            image = "2.jpg";
          }

          else if(name.includes("ข้าวราดแกง เบอร์ 3")){
            image = "3.jpg";
          }

          else if(name.includes("อาหารตามสั่ง เบอร์ 4")){
            image = "4.jpg";
          }

          else if(name.includes("ฐ.ข้าวมันไก่")){
            image = "5.jpg";
          }

          else if(name.includes("อาหารอีสาน ขนมจีน")){
            image = "6.jpg";
          }

          else if(name.includes("ข้าวราดแกง (มุสลิม)")){
            image = "7.jpg";
          }

          else if(name.includes("ข้าวราดแกง เบอร์ 8")){
            image = "8.jpg";
          }

          else if(name.includes("เจ้น้อง ก๋วยเตี๋ยวเนื้อ / ไก่ตุ๋น")){
            image = "9.jpg";
          }

          else if(name.includes("อาหารตามสั่ง เบอร์ 10")){
            image = "10.jpg";
          }

          else if(name.includes("เครื่องดื่ม & ขนมหวาน & ผลไม้")){
            image = "11.jpg";
          }

          else if(name.includes("ร้านข้างหน้าร้านน้ำ เบอร์ 11")){
            image = "12.jpg";
          }

          // =========================
          // CREATE SHOP
          // =========================

          if(!restaurants[name]){

            restaurants[name] = {

              totalScore:0,
              totalPeople:0,

              highlight:"",
              category:"",
              image:"",

              menus:{}

            };

          }

          // =========================
          // SCORE
          // =========================

          restaurants[name]
            .totalScore += score;

          restaurants[name]
            .totalPeople += 1;

          restaurants[name]
            .highlight = highlight;

          restaurants[name]
            .category = category;

          restaurants[name]
            .image = image;

          // =========================
          // MENU SCORE
          // =========================

          if(menu){

            if(
              !restaurants[name]
                .menus[menu]
            ){

              restaurants[name]
                .menus[menu] = {

                totalScore:0,
                people:0

              };

            }

            restaurants[name]
              .menus[menu]
              .totalScore += score;

            restaurants[name]
              .menus[menu]
              .people += 1;

          }

        });

        // =========================
        // CONVERT DATA
        // =========================

        allRestaurants =

          Object.entries(restaurants)

          .map(([name,data]) => {

            const avgScore =

              data.totalPeople > 0

              ? (
                  data.totalScore
                  /
                  data.totalPeople
                )

              : 0;

            // =========================
            // SORT MENU
            // =========================

            const sortedMenus =

              Object.entries(data.menus)

              .map(([menuName,menuData]) => {

                const menuAvg =

                  menuData.people > 0

                  ? (
                      menuData.totalScore
                      /
                      menuData.people
                    )

                  : 0;

                return {

                  name:menuName,

                  avg:menuAvg,

                  people:menuData.people

                };

              })

              .sort((a,b) => {

                if(b.avg !== a.avg){

                  return b.avg - a.avg;

                }

                if(b.people !== a.people){

                  return b.people - a.people;

                }

                return a.name.localeCompare(
                  b.name,
                  "th"
                );

              });

            return {

              name:name,

              avg:avgScore,

              people:data.totalPeople,

              highlight:data.highlight,

              category:data.category,

              image:data.image,

              menus:sortedMenus

            };

          })

          // =========================
          // SORT RESTAURANT
          // =========================

          .sort((a,b) => {

            if(b.avg !== a.avg){

              return b.avg - a.avg;

            }

            return b.people - a.people;

          });

        console.log(allRestaurants);

        createCategoryButtons();

        showRestaurants(allRestaurants);

      }

      catch(error){

        console.error(error);

      }

    }

    // =========================
    // CATEGORY BUTTONS
    // =========================

    function createCategoryButtons(){

      const categoryList =
        document.getElementById(
          "categoryList"
        );

      if(!categoryList){

        console.log(
          "categoryList not found"
        );

        return;

      }

      const categorySet =
        new Set();

      allRestaurants.forEach(shop => {

        const words =

          shop.category
          .split(/[ ,/&]+/);

        words.forEach(word => {

          if(word.trim()){

            categorySet.add(
              word.trim()
            );

          }

        });

      });

      let html = "";

      html += `

        <button
          class="category-btn"
          onclick="
            filterRestaurants('ทั้งหมด')
          "
        >

          ทั้งหมด

        </button>

      `;

      categorySet.forEach(category => {

        html += `

          <button
            class="category-btn"

            onclick="
              filterRestaurants(
                '${category}'
              )
            "
          >

            ${category}

          </button>

        `;

      });

      categoryList.innerHTML =
        html;

    }

    // =========================
    // FILTER
    // =========================

    function filterRestaurants(category){

      if(category === "ทั้งหมด"){

        showRestaurants(
          allRestaurants
        );

        return;

      }

      const filtered =

        allRestaurants.filter(shop =>

          shop.category.includes(
            category
          )

        );

      showRestaurants(filtered);

    }

    // =========================
    // SHOW RESTAURANTS
    // =========================

    function showRestaurants(restaurants){

      const cards =
        document.getElementById(
          "cards"
        );

      if(!cards){

        console.log(
          "cards not found"
        );

        return;

      }

      let html = "";

      if(restaurants.length === 0){

        cards.innerHTML = `

          <div class="empty">

            ไม่พบร้านอาหาร

          </div>

        `;

        return;

      }

      restaurants.forEach((shop,index) => {

        let menuHTML = "";

        shop.menus.forEach(menu => {

          menuHTML += `

            <div class="menu-item">

              🍴 ${menu.name}

              <br><br>

              ⭐ ${menu.avg.toFixed(1)}/5

              <br>

              👥 ${menu.people} รีวิว

            </div>

          `;

        });

        html += `

          <div class="card">

            <img
              class="card-image"
              src="images/${shop.image}"
            >

            <div class="card-content">

              <div class="top-rank">

                TOP ${index + 1}

              </div>

              <div class="restaurant-name">

                ${shop.name}

              </div>

              <div class="score">

                ⭐ ${shop.avg.toFixed(1)}/5

              </div>

              <div class="info">

                🍜 ประเภทอาหาร:
                ${shop.category}

              </div>

              <div class="info">

                🔥 จุดเด่น:
                ${shop.highlight}

              </div>

              <div class="info">

                👥 จำนวนผู้รีวิว:
                ${shop.people} คน

              </div>

              <div class="menu-section">

                <div class="menu-title">

                  🍽️ เมนูแนะนำ

                </div>

                ${menuHTML}

              </div>

            </div>

          </div>

        `;

      });

      cards.innerHTML = html;

    }

    // =========================
    // START
    // =========================

    document.addEventListener(

      "DOMContentLoaded",

      function(){

        loadData();

      }

    );

  </script>

</body>
</html>
